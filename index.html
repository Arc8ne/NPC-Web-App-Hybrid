<!DOCTYPE html>
<html>
  <head>
    <title>NSPAC Web App</title>
    <style>
      body {
        font-family: Gordita, Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      }

      * {
        margin: 0px;
      }

      #root {
        padding: 8px;
      }

      .pdf-viewer {
        display: flex;
        flex-direction: column;
        row-gap: 8px;

        .open-pdf-file-button {
          width: fit-content;
        }
      }
    </style>
  </head>
  <body id="root">
    <script src="https://unpkg.com/mithril/mithril.js"></script>

    <!-- PDF.js Core layer -->
    <script type="module" src="https://unpkg.com/pdfjs-dist/build/pdf.worker.mjs"></script>
    <!-- PDF.js Display layer -->
    <script type="module" src="https://unpkg.com/pdfjs-dist/build/pdf.mjs"></script>

    <script type="module">
      let FileSelectionDialog = {
        selectionModes: ["Specify a file path", "Drag & drop a file"],
        selectionMode: undefined,
        filePath: "",
        view: (vnode) => {
          return m(
            "dialog",
            [
              m(
                "div",
                [
                  m("p", "Selection mode:"),
                  m(
                    "select",
                    {
                      value: vnode.state.selectionMode,
                      onchange: e => {
                        vnode.state.selectionMode = e.target.value;
                      }
                    },
                    FileSelectionDialog.selectionModes.map(
                      option => m("option", option)
                    )
                  ),
                  vnode.state.selectionMode == FileSelectionDialog.selectionModes[0] ? m(
                    "",
                    m("p", "File path:"),
                    m(
                      "input",
                      {
                        value: vnode.state.filePath,
                        onchange: e => {
                          vnode.state.filePath = e.target.value;
                        }
                      }
                    )
                  ) : m(""),
                  m(
                    "",
                    [
                      m(
                        "button",
                        {
                          onmouseup: () => {
                            vnode.attrs.onFilePathConfirmed(vnode.state.filePath);
                            vnode.dom.close();
                          }
                        },
                        "Ok"
                      ),
                      m(
                        "button",
                        {
                          onmouseup: () => {
                            vnode.dom.close();
                          }
                        },
                        "Cancel"
                      )
                    ]
                  )
                ]
              )
            ]
          );
        }
      };
      FileSelectionDialog.selectionMode = FileSelectionDialog.selectionModes[0];

      let PdfViewer = {
        pdf: null,
        pdfPages: [],
        isLoading: false,
        view: vnode => {
          let pdfCanvas = m(
            "canvas",
            {
              style: {
                display: vnode.state.pdf == null ? "none" : undefined
              }
            }
          );
          let fileSelectionDialog = m(
            FileSelectionDialog,
            {
              onFilePathConfirmed: async (pdfFilePath) => {
                vnode.state.isLoading = true;
                vnode.state.pdf = await pdfjsLib.getDocument(`file:///${pdfFilePath}`).promise;
                vnode.state.isLoading = false;
                vnode.state.pdfPages = [];
                for (let pageNumber = 1; pageNumber <= vnode.state.pdf.numPages; pageNumber++) {
                  let page = await vnode.state.pdf.getPage(pageNumber);
                  vnode.state.pdfPages.push(page);
                }
                m.redraw();
              }
            }
          );
          return m(
            ".pdf-viewer",
            [
              m("h1", "PDF viewer"),
              vnode.state.isLoading == false ? m(
                "button.open-pdf-file-button",
                {
                  onmousedown: () => {
                    fileSelectionDialog.dom.showModal();
                  }
                },
                "Open PDF file"
              ) : m("p", "Loading PDF file..."),
              ...vnode.state.pdfPages.map(
                pdfPage => m(
                  "canvas",
                  {
                    oncreate: pdfPageCanvasVnode => {
                      let viewport = pdfPage.getViewport(
                        {
                          scale: 1
                        }
                      );
                      // For supporting HiDPI screens.
                      let outputScale = window.devicePixelRatio || 1;
                      pdfPageCanvasVnode.dom.width = Math.floor(viewport.width * outputScale);
                      pdfPageCanvasVnode.dom.height = Math.floor(viewport.height * outputScale);
                      pdfPageCanvasVnode.dom.style.width = `${Math.floor(viewport.width)}px`;
                      pdfPageCanvasVnode.dom.style.height = `${Math.floor(viewport.height)}px`;
                      pdfPage.render(
                        {
                          canvasContext: pdfPageCanvasVnode.dom.getContext("2d"),
                          transform: outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null,
                          viewport
                        }
                      );
                    }
                  }
                )
              ),
              fileSelectionDialog
            ]
          );
        }
      };

      let Terminal = {
        view: () => {
          return m(".terminal");
        }
      };

      m.route(
        document.getElementById("root"),
        "/pdf-viewer",
        {
          "/pdf-viewer": PdfViewer,
          "/terminal": Terminal
        }
      );
    </script>
  </body>
</html>
